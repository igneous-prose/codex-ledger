name: release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing Git tag or release tag to attach artifacts to
        required: false
        type: string
      publish_to_pypi:
        description: Trigger the trusted-publishing scaffold job
        required: false
        default: false
        type: boolean
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  github-release-assets:
    needs: build
    if: github.event_name == 'release' || github.event.inputs.release_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
          files: dist/*

  publish-pypi:
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_pypi == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
